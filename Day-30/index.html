<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unify Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>🛍️ Unify Store</h1>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search products..." />
    <button onclick="searchProducts()">Search</button>
  </div>

  <div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cartCount">0</span>
  </div>
</header>

<section class="categories">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('electronics')">Electronics</button>
  <button onclick="filterCategory('fashion')">Fashion</button>
  <button onclick="filterCategory('books')">Books</button>
</section>

<div id="loader" class="loader hidden"></div>

<section id="products" class="product-grid"></section>

<!-- Cart Sidebar -->
<div id="cartSidebar" class="cart-sidebar">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3 id="cartTotal"></h3>
  <button class="checkout-btn" onclick="checkout()">Buy Now</button>
</div>

<script src="script.js"></script>
</body>
</html>
